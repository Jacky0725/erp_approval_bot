app:
  name: reagent-approval-bot
  dry_run: true

browser:
  headless: false
  slow_mo_ms: 100
  timeout_ms: 30000

llm:
  provider: siliconflow
  base_url: https://api.siliconflow.cn/v1
  model: deepseek-ai/DeepSeek-V3.2
  timeout_seconds: 45
  max_retries: 1

paths:
  rules_excel: config/rules.xlsx
  structured_rules_excel: config/rules_structured.xlsx
  rule_candidates_excel: config/rule_candidates.xlsx
  name_aliases_yaml: config/name_aliases.yaml
  review_queue_excel: data/review_queue.xlsx
  audit_log_dir: data/logs

approval:
  default_action: manual_review
  write_mode: disabled
  write_min_confidence: 0.8
  write_max_attempts: 2
  write_failure_break_limit: 1
  parallel_workers: 3
  reagent_page_size: 20
  allowed_actions:
    - approve
    - reject
    - manual_review

scheduler:
  enabled: false
  mode: interval
  interval_hours: 6
  daily_time: '16:00'
  use_default_run_policy: true
  process_all_todos_max: 50
  approval_write_mode: multi_page
  approval_write_min_confidence: '0.8'
  auto_pass: false
  skip_manual_review_lists: true

notification:
  dingtalk:
    enabled: false
    webhook_env: DINGTALK_ROBOT_WEBHOOK
    secret_env: DINGTALK_ROBOT_SECRET
    at_all: true

reagent:
  physicochemical_property_options:
    - "\u666e\u901a\u7c7b"
    - "\u91cd\u91d1\u5c5e\u7c7b"
    - "\u6eb4\u7898\u7c7b"
    - "\u5e38\u89c4\u9178"
    - "\u5e38\u89c4\u78b1"
    - "\u7279\u6b8a\u9178"
    - "\u5f02\u5473"
    - "\u53d1\u70df\u7c7b"
    - "\u9ad8\u6bd2\u7c7b"
    - "\u6c27\u5316\u5242"
    - "\u5f3a\u53cd\u5e94"
    - "\u523a\u6fc0\u6027"
    - "\u6613\u71c3\u7c7b"
    - "\u6613\u7206\u7c7b"
    - "\u62d2\u6536\u7c7b"
    - "\u672a\u77e5\u7c7b"
  physicochemical_property_aliases:
    "\u5f3a\u53cd\u5e94\u6027":
      - "\u5f3a\u53cd\u5e94"
    "\u6613\u71c3\u6db2\u4f53":
      - "\u6613\u71c3\u7c7b"
    "\u4e0d\u5efa\u8bae\u63a5\u6536\u7c7b":
      - "\u62d2\u6536\u7c7b"
    "\u62d2\u6536\u7c7b":
      - "\u62d2\u6536\u7c7b"
    "\u672a\u77e5\u7c7b":
      - "\u672a\u77e5\u7c7b"

selectors:
  username_input: "#userName"
  password_input: "#password"
  login_button: "button[type='submit']"
  review_items: ""
  approve_button: ""
  reject_button: ""
